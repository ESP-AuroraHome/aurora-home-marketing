name: Coverage

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  test-and-coverage:
    name: Run Tests & Post Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - run: npx nuxt prepare

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Download base coverage artifact
        id: base-coverage
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const artifacts = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'coverage-summary',
                per_page: 10,
              });
              const mainArtifacts = artifacts.data.artifacts.filter(
                a => a.workflow_run?.head_branch === 'main' && !a.expired
              );
              if (mainArtifacts.length === 0) return null;
              const latest = mainArtifacts[0];
              const download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: latest.id,
                archive_format: 'zip',
              });
              const fs = require('fs');
              require('child_process').execSync('mkdir -p /tmp/base-coverage');
              fs.writeFileSync('/tmp/base-coverage.zip', Buffer.from(download.data));
              require('child_process').execSync('unzip -o /tmp/base-coverage.zip -d /tmp/base-coverage');
              return 'ok';
            } catch {
              return null;
            }

      - name: Post coverage comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const THRESHOLDS = { lines: 70, statements: 70, functions: 70, branches: 60 };

            function statusIcon(pct, threshold) {
              return pct >= threshold ? '🔵' : '🔴';
            }
            function changeIcon(delta) {
              if (Math.abs(delta) < 0.05) return '🟰 ±0%';
              return delta > 0 ? `🟢 +${delta.toFixed(2)}%` : `🔴 ${delta.toFixed(2)}%`;
            }

            let summary = '## Coverage Report\n\n⚠️ Coverage data not available.';
            try {
              const json = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
              const t = json.total;
              let base = null;
              try {
                const baseJson = JSON.parse(fs.readFileSync('/tmp/base-coverage/coverage-summary.json', 'utf8'));
                base = baseJson.total;
              } catch {}
              const rows = [
                { key: 'lines',      label: 'Lines',      threshold: THRESHOLDS.lines },
                { key: 'statements', label: 'Statements', threshold: THRESHOLDS.statements },
                { key: 'functions',  label: 'Functions',  threshold: THRESHOLDS.functions },
                { key: 'branches',   label: 'Branches',   threshold: THRESHOLDS.branches },
              ];
              const tableRows = rows.map(({ key, label, threshold }) => {
                const cur = t[key];
                const pct = cur.pct;
                const change = base ? changeIcon(pct - base[key].pct) : '—';
                return `| ${statusIcon(pct, threshold)} | ${label} | ${pct.toFixed(2)}% (🎯 ${threshold}%) | ${change} | ${cur.covered} / ${cur.total} |`;
              });
              summary = [
                '## Coverage Report',
                '',
                '| Status | Category | Percentage | Change | Covered / Total |',
                '|--------|----------|------------|--------|-----------------|',
                ...tableRows,
                '',
                `_Generated on commit ${context.sha}_`,
              ].join('\n');
            } catch (e) {
              summary = `## Coverage Report\n\n⚠️ Coverage data not available.\n\n\`${e.message}\``;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## Coverage Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json
          retention-days: 30
